components:
  terraform:
    s3-bucket/basic:
      metadata:
        component: target
      vars:
        enabled: true
        account_map_tenant_name: core
        # Suggested configuration for all buckets
        user_enabled: false
        acl: "private"
        grants: null
        force_destroy: false
        versioning_enabled: true
        allow_encrypted_uploads_only: true
        block_public_acls: true
        block_public_policy: true
        ignore_public_acls: true
        restrict_public_buckets: true
        allow_ssl_requests_only: true
        # Exercises the `templatestring()` substitution in `local.bucket_policy`.
        # `${id}` must resolve to `module.this.id` (the bucket name) in the
        # rendered bucket policy.
        iam_policy_statements:
          - sid: TestIdSubstitution
            effect: Deny
            actions:
              - s3:DeleteBucket
            resources:
              - "arn:aws:s3:::${id}"
            principals:
              - type: AWS
                identifiers:
                  - "arn:aws:iam::000000000000:root"
        lifecycle_configuration_rules:
          - id: default
            enabled: true
            abort_incomplete_multipart_upload_days: 90
            filter_and:
              prefix: ""
              tags: {}
            transition:
              - storage_class: GLACIER
                days: 60
            noncurrent_version_transition:
              - storage_class: GLACIER
                days: 60
            noncurrent_version_expiration:
              days: 90
            expiration:
              days: 120
